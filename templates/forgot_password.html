<!DOCTYPE html>
<html lang="zh" data-bs-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - OpenList-strm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:linear-gradient(135deg,#0d1117,#161b22);min-height:100vh}
.c{background:rgba(22,27,34,.95);border:1px solid #30363d;border-radius:16px}
.f{background:#21262d;border-color:#30363d;color:#e6edf3;padding:11px 14px;border-radius:8px}
.f:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.15)}
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
<div class="c p-4" style="width:400px;">
{% with messages=get_flashed_messages(with_categories=true) %}
{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ 'danger' if c=='error' else 'success' }} py-2" style="font-size:13px;">{{ m }}</div>{% endfor %}{% endif %}
{% endwith %}
{% if reset_username %}<div class="alert alert-success py-2 mb-3" style="font-size:13px;">用户名：{{ reset_username }}，密码已重置！</div>{% endif %}
<form method="post">
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">安全码</label><input type="text" class="form-control f" name="security_code" placeholder="请输入安全码" required autofocus></div>
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">新密码</label><input type="password" class="form-control f" name="new_password" placeholder="新密码（6位以上）" required minlength="6"></div>
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">确认新密码</label><input type="password" class="form-control f" name="confirm_password" placeholder="再次输入新密码" required></div>
<button type="submit" class="btn w-100" style="background:#8b5cf6;color:#fff;">重置密码</button>
</form>
<div class="text-center mt-3"><a href="{{ url_for('login') }}" style="color:#8b5cf6;text-decoration:none;font-size:13px;">返回登录</a></div>
</div></div>
</body></html>
