<!DOCTYPE html>
<html lang="zh" data-bs-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - OpenList-strm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
body{background:linear-gradient(135deg,#0d1117,#161b22);min-height:100vh}
.c{background:rgba(22,27,34,.95);border:1px solid #30363d;border-radius:16px}
.f{background:#21262d;border-color:#30363d;color:#e6edf3;padding:11px 14px;border-radius:8px}
.f:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.15)}
.f::placeholder{color:#6e7681}
.b{background:linear-gradient(135deg,#8b5cf6,#7c3aed);border:none;color:#fff;padding:11px;font-weight:600;border-radius:8px;width:100%}
.b:hover{background:linear-gradient(135deg,#9d74f7,#8b5cf6);color:#fff}
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
<div class="c p-4" style="width:400px;">
<div class="text-center mb-4">
<div style="width:56px;height:56px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
<i class="bi bi-collection-play text-white fs-3"></i></div>
<div style="font-size:20px;font-weight:700;color:#e6edf3;">注册新用户</div>
<div style="font-size:12px;color:#8b949e;">OpenList-strm Fixed Edition</div>
</div>
{% with messages=get_flashed_messages(with_categories=true) %}
{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ 'danger' if c=='error' else 'info' }} py-2" style="font-size:13px;">{{ m }}</div>{% endfor %}{% endif %}
{% endwith %}
<form method="post">
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">用户名</label><input type="text" class="form-control f" name="username" placeholder="设置用户名" required autofocus></div>
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">密码</label><input type="password" class="form-control f" name="password" placeholder="设置密码（6位以上）" required minlength="6"></div>
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">确认密码</label><input type="password" class="form-control f" name="confirm_password" placeholder="再次输入密码" required></div>
<button type="submit" class="btn b"><i class="bi bi-person-plus me-1"></i>注册</button>
<div class="text-center mt-3"><a href="{{ url_for('login') }}" style="color:#8b5cf6;text-decoration:none;font-size:13px;">已有账号？去登录</a></div>
</form>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
