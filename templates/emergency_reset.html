<!DOCTYPE html>
<html lang="zh" data-bs-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧急密码重置 - OpenList-strm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
body{background:linear-gradient(135deg,#0d1117,#161b22);min-height:100vh}
.c{background:rgba(22,27,34,.95);border:1px solid #30363d;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.bi{width:56px;height:56px;background:linear-gradient(135deg,#dc2626,#b91c1c);border-radius:14px;display:inline-flex;align-items:center;justify-content:center}
.f{background:#21262d;border-color:#30363d;color:#e6edf3;padding:11px 14px;border-radius:8px}
.f:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.15)}
.f::placeholder{color:#6e7681}
.b{background:linear-gradient(135deg,#dc2626,#b91c1c);border:none;color:#fff;padding:11px;font-weight:600;border-radius:8px;width:100%;font-size:15px}
.b:hover{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
.warn{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:12px;font-size:13px;color:#fca5a5;margin-bottom:16px}
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
<div class="c p-4" style="width:420px;">
<div class="text-center mb-3">
<div class="bi mb-3"><i class="bi bi-shield-exclamation text-white fs-3"></i></div>
<div style="font-size:20px;font-weight:700;color:#e6edf3;">紧急密码重置</div>
<div style="font-size:12px;color:#8b949e;">Emergency Password Reset</div>
</div>
<div class="warn">
<i class="bi bi-exclamation-triangle me-1"></i>
此操作将覆盖原密码，请确保安全使用。<br>
仅在无法通过正常流程登录时使用。
</div>
{% with messages=get_flashed_messages(with_categories=true) %}
{% if messages %}{% for c,m in messages %}<div class="alert alert-{{ 'danger' if c=='error' else 'info' }} py-2" style="font-size:13px;">{{ m }}</div>{% endfor %}{% endif %}
{% endwith %}
<form method="post">
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">重置码（EMERGENCY_RESET_CODE）</label><input type="text" class="form-control f" name="code" placeholder="请输入环境变量中的重置码" required autofocus></div>
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">新密码</label><input type="password" class="form-control f" name="new_password" placeholder="新密码（至少4位）" required></div>
<div class="mb-3"><label style="color:#8b949e;font-size:13px;">确认新密码</label><input type="password" class="form-control f" name="confirm_password" placeholder="再次输入新密码" required></div>
<button type="submit" class="btn b"><i class="bi bi-key me-1"></i>确认重置密码</button>
</form>
<div class="text-center mt-3"><a href="{{ url_for('login') }}" style="color:#8b5cf6;text-decoration:none;font-size:13px;">返回登录页</a></div>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
